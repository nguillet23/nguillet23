<svg viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      
      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes floatingBar {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-5px);
        }
      }
      
      @keyframes lightsaberIgnite {
        0% {
          height: 0;
          opacity: 0;
        }
        20% {
          height: 150px;
          opacity: 0.3;
        }
        50% {
          height: 200px;
          opacity: 0.8;
        }
        100% {
          height: 220px;
          opacity: 1;
        }
      }
      
      @keyframes lightsaberGlow {
        0%, 100% {
          filter: drop-shadow(0 0 8px #00ff41) drop-shadow(0 0 16px #00ff41) drop-shadow(0 0 24px rgba(0, 255, 65, 0.5));
        }
        50% {
          filter: drop-shadow(0 0 12px #00ff41) drop-shadow(0 0 20px #00ff41) drop-shadow(0 0 32px rgba(0, 255, 65, 0.7));
        }
      }
      
      @keyframes hiltPulse {
        0%, 100% {
          fill: #cccccc;
        }
        50% {
          fill: #ffffff;
        }
      }
      
      @keyframes flickerEffect {
        0%, 100% {
          opacity: 1;
        }
        45% {
          opacity: 1;
        }
        46% {
          opacity: 0.9;
        }
        48% {
          opacity: 1;
        }
        49% {
          opacity: 0.95;
        }
        51% {
          opacity: 1;
        }
      }
      
      .bg { fill: #0d1117; }
      .border { stroke: #30363d; stroke-width: 1; }
      .name { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 48px; 
        font-weight: 700; 
        fill: #c9d1d9;
        animation: slideInLeft 0.8s ease-out;
      }
      .subtitle { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 18px; 
        fill: #79c0ff;
        animation: slideInLeft 0.8s ease-out 0.15s both;
      }
      .text { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 15px; 
        fill: #8b949e;
        animation: slideInUp 0.8s ease-out 0.3s both;
      }
      .accent { 
        fill: #58a6ff;
        animation: floatingBar 3s ease-in-out infinite;
      }
      .tech-text {
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 15px; 
        fill: #8b949e;
        animation: slideInUp 0.8s ease-out 0.45s both;
      }
      .divider {
        stroke: #30363d;
        stroke-width: 1;
        animation: slideInUp 0.8s ease-out 0.45s both;
      }
      .section-title {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 20px;
        font-weight: 700;
        fill: #c9d1d9;
        animation: slideInUp 0.8s ease-out 0.75s both;
        cursor: default;
      }
      .section-title:hover {
        fill: #79c0ff;
        text-decoration: underline;
      }
      .section-content {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 14px;
        fill: #8b949e;
        line-height: 1.6;
        animation: slideInUp 0.8s ease-out 0.9s both;
      }
      
      .lightsaber-blade {
        animation: lightsaberIgnite 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards, lightsaberGlow 2s ease-in-out 1.8s infinite;
        opacity: 0;
      }
      
      .lightsaber-hilt {
        animation: hiltPulse 2s ease-in-out 1.8s infinite;
      }
      
      .lightsaber-core {
        animation: lightsaberIgnite 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s forwards, flickerEffect 0.3s ease-in-out 1.8s infinite;
        opacity: 0;
      }

    </style>
    
    <filter id="lightsaberBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" class="bg"/>
  <rect width="800" height="620" class="border"/>

  <!-- Accent bar with pulsing glow -->
  <rect width="800" height="4" class="accent"/>

  <!-- Content -->
  <text x="60" y="80" class="name">Nicholas Guillet</text>
  
  <text x="60" y="130" class="subtitle">Computer Engineer @ Villanova</text>
  <text x="60" y="160" class="text">Data Science • AI/ML Engineering • Analytics</text>
  
  <!-- Divider -->
  <line x1="60" y1="185" x2="740" y2="185" class="divider"/>
  
  <!-- Tech badges -->
  <text x="60" y="225" class="tech-text">Python • TensorFlow • PyTorch • Scikit-learn • SQL</text>
  
  <!-- About Section -->
  <text x="60" y="280" class="section-title">About</text>
  <text x="60" y="310" class="section-content">Data scientist and ML engineer passionate about building intelligent systems that</text>
  <text x="60" y="330" class="section-content">solve real problems. I specialize in model optimization, data pipelines, and turning</text>
  <text x="60" y="350" class="section-content">complex data into actionable insights.</text>
  <text x="60" y="370" class="section-content">When I'm not coding, I'm playing Ultimate Frisbee or building statistical models.</text>
  

  <!-- What I'm Into Section -->
  <text x="60" y="400" class="section-title">What I'm Into</text>
  <text x="60" y="430" class="section-content">Machine learning model optimization, statistical analysis, data visualization,</text>
  <text x="60" y="450" class="section-content">and building end-to-end ML systems. Also passionate about sports analytics.</text>

  <!-- Contact Section -->
  <text x="60" y="490" class="section-title">Reach Out</text>
  <text x="60" y="520" class="section-content">Questions? Ideas? Let's connect!</text>

  <!-- LIGHTSABER -->
  
  <!-- Outer glow layer -->
  <rect x="720" y="200" width="16" height="220" rx="8" fill="#00ff41" opacity="0.15" class="lightsaber-blade" filter="url(#lightsaberBlur)"/>
  
  <!-- Middle glow layer -->
  <rect x="722" y="200" width="12" height="220" rx="6" fill="#00ff41" opacity="0.4" class="lightsaber-blade" filter="url(#lightsaberBlur)"/>
  
  <!-- Core blade -->
  <rect x="724" y="200" width="8" height="220" rx="4" fill="#00ff41" class="lightsaber-core"/>
  
  <!-- Inner bright core -->
  <rect x="726" y="200" width="4" height="220" rx="2" fill="#ffffff" opacity="0.8" class="lightsaber-core"/>
  
  <!-- Hilt - circular guard -->
  <circle cx="728" cy="420" r="18" fill="none" stroke="#888888" stroke-width="2"/>
  <circle cx="728" cy="420" r="14" fill="#444444" class="lightsaber-hilt"/>
  
  <!-- Hilt - cylinder -->
  <rect x="712" y="420" width="32" height="35" rx="2" fill="#555555" class="lightsaber-hilt"/>
  
  <!-- Hilt - grip details -->
  <line x1="718" y1="420" x2="718" y2="455" stroke="#333333" stroke-width="1.5" opacity="0.7"/>
  <line x1="728" y1="420" x2="728" y2="455" stroke="#333333" stroke-width="1.5" opacity="0.7"/>
  <line x1="738" y1="420" x2="738" y2="455" stroke="#333333" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Hilt - bottom cap -->
  <ellipse cx="728" cy="458" rx="16" ry="6" fill="#666666" class="lightsaber-hilt"/>

</svg>