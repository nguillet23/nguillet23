<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      
      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      
      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes glowPulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
        100% {
          opacity: 1;
        }
      }
      
      @keyframes subtleGlow {
        0%, 100% {
          filter: drop-shadow(0 0 0px #58a6ff);
        }
        50% {
          filter: drop-shadow(0 0 8px #58a6ff);
        }
      }
      
      .bg { fill: #0d1117; }
      .border { stroke: #30363d; stroke-width: 1; }
      .name { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 48px; 
        font-weight: 700; 
        fill: #c9d1d9;
        animation: slideInLeft 0.8s ease-out;
      }
      .subtitle { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 18px; 
        fill: #79c0ff;
        animation: slideInLeft 0.8s ease-out 0.15s both;
      }
      .text { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 15px; 
        fill: #8b949e;
        animation: slideInUp 0.8s ease-out 0.3s both;
      }
      .accent { 
        fill: #58a6ff;
        animation: glowPulse 2s ease-in-out infinite;
      }
      .tech-text {
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 15px; 
        fill: #8b949e;
        animation: slideInUp 0.8s ease-out 0.45s both;
      }
      .links-text {
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 15px;
        animation: slideInUp 0.8s ease-out 0.6s both;
      }
      .divider {
        stroke: #30363d;
        stroke-width: 1;
        animation: slideInUp 0.8s ease-out 0.45s both;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" class="bg"/>
  <rect width="800" height="300" class="border"/>

  <!-- Accent bar with pulsing glow -->
  <rect width="800" height="4" class="accent"/>

  <!-- Content -->
  <text x="60" y="80" class="name">Nicholas Guillet</text>
  
  <text x="60" y="130" class="subtitle">Computer Engineer @ Villanova</text>
  <text x="60" y="160" class="text">Data Science • Data Engineering • ML/AI Engineer</text>
  
  <!-- Divider -->
  <line x1="60" y1="185" x2="740" y2="185" class="divider"/>
  
  <!-- Tech badges -->
  <text x="60" y="225" class="tech-text">Python • TypeScript • React • Node.js • PostgreSQL</text>
  
  <!-- Links -->
  <text x="60" y="265" class="links-text">
    <tspan class="accent">→</tspan>
    <tspan fill="#79c0ff" font-weight="600"> Email</tspan>
    <tspan fill="#8b949e"> · </tspan>
    <tspan fill="#79c0ff" font-weight="600">LinkedIn</tspan>
    <tspan fill="#8b949e"> · </tspan>
    <tspan fill="#79c0ff" font-weight="600">Portfolio</tspan>
  </text>
</svg>