<svg viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      
      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      
      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes glowPulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
        100% {
          opacity: 1;
        }
      }
      
      @keyframes subtleGlow {
        0%, 100% {
          filter: drop-shadow(0 0 0px #58a6ff);
        }
        50% {
          filter: drop-shadow(0 0 8px #58a6ff);
        }
      }
      
      @keyframes buttonGlow {
        0%, 100% {
          filter: drop-shadow(0 0 0px #58a6ff);
        }
        50% {
          filter: drop-shadow(0 0 12px #58a6ff);
        }
      }
      
      @keyframes floatingBar {
        0%, 100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-5px);
        }
      }
      
      @keyframes textUnderline {
        0% {
          stroke-dashoffset: 100;
        }
        100% {
          stroke-dashoffset: 0;
        }
      }
      

      
      .bg { fill: #0d1117; }
      .border { stroke: #30363d; stroke-width: 1; }
      .name { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 48px; 
        font-weight: 700; 
        fill: #c9d1d9;
        animation: slideInLeft 0.8s ease-out;
      }
      .subtitle { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 18px; 
        fill: #79c0ff;
        animation: slideInLeft 0.8s ease-out 0.15s both;
      }
      .text { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 15px; 
        fill: #8b949e;
        animation: slideInUp 0.8s ease-out 0.3s both;
      }
      .accent { 
        fill: #58a6ff;
        animation: glowPulse 2s ease-in-out infinite;
      }
      .accent { 
        fill: #58a6ff;
        animation: floatingBar 3s ease-in-out infinite;
      }
      .tech-text {
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 15px; 
        fill: #8b949e;
        animation: slideInUp 0.8s ease-out 0.45s both;
      }
      .links-text {
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 15px;
        animation: slideInUp 0.8s ease-out 0.6s both;
      }
      .link-button {
        cursor: pointer;
      }
      .link-button:hover {
        transform: scale(1.08);
        transform-origin: 105px 262px;
      }
      .link-button:hover text {
        fill: #58a6ff;
      }
      .link-button:hover rect {
        stroke: #58a6ff;
        stroke-width: 1.5;
        animation: buttonGlow 0.6s ease-in-out infinite;
      }
      .divider {
        stroke: #30363d;
        stroke-width: 1;
        animation: slideInUp 0.8s ease-out 0.45s both;
      }
      .section-title {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 20px;
        font-weight: 700;
        fill: #c9d1d9;
        animation: slideInUp 0.8s ease-out 0.75s both;
        cursor: default;
      }
      .section-title:hover {
        fill: #79c0ff;
        text-decoration: underline;
      }
      .section-content {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 14px;
        fill: #8b949e;
        line-height: 1.6;
        animation: slideInUp 0.8s ease-out 0.9s both;
      }

    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" class="bg"/>
  <rect width="800" height="700" class="border"/>

  <!-- Accent bar with pulsing glow -->
  <rect width="800" height="4" class="accent"/>

  <!-- Content -->
  <text x="60" y="80" class="name">Nicholas Guillet</text>
  
  <text x="60" y="130" class="subtitle">Computer Engineer @ Villanova</text>
  <text x="60" y="160" class="text">Backend Development • Data Engineering • Systems Design</text>
  
  <!-- Divider -->
  <line x1="60" y1="185" x2="740" y2="185" class="divider"/>
  
  <!-- Tech badges -->
  <text x="60" y="225" class="tech-text">Python • TypeScript • React • Node.js • PostgreSQL</text>
  
  <!-- Links as Buttons -->
  <g class="links-text">
    <!-- Email Button -->
    <a href="mailto:nguillet@villanova.edu" class="link-button">
      <rect x="60" y="245" width="90" height="35" fill="none" stroke="#30363d" stroke-width="1" rx="4"/>
      <text x="68" y="266" font-weight="600" fill="#79c0ff" font-size="14">✉️ Email</text>
    </a>
    
    <!-- LinkedIn Button -->
    <a href="https://www.linkedin.com/in/nicholas-guillet/" class="link-button">
      <rect x="165" y="245" width="100" height="35" fill="none" stroke="#30363d" stroke-width="1" rx="4"/>
      <text x="173" y="266" font-weight="600" fill="#79c0ff" font-size="14">💼 LinkedIn</text>
    </a>
    
    <!-- Portfolio Button -->
    <a href="https://nguillet23.github.io/GuilletPersonalWebsite/" class="link-button">
      <rect x="280" y="245" width="110" height="35" fill="none" stroke="#30363d" stroke-width="1" rx="4"/>
      <text x="288" y="266" font-weight="600" fill="#79c0ff" font-size="14">🔗 Portfolio</text>
    </a>
  </g>

  <!-- About Section -->
  <text x="60" y="320" class="section-title">About</text>
  <text x="60" y="350" class="section-content">I'm passionate about building systems that solve real problems. I spend most of my</text>
  <text x="60" y="370" class="section-content">time thinking about data pipelines, backend architecture, and how to make complex</text>
  <text x="60" y="390" class="section-content">things understandable.</text>
  
  <text x="60" y="420" class="section-content">Outside of code, I play competitive Ultimate Frisbee—it's taught me a lot about</text>
  <text x="60" y="440" class="section-content">strategy and performance analysis, which often ends up inspiring my projects.</text>

  <!-- What I'm Into Section -->
  <text x="60" y="480" class="section-title">What I'm Into</text>
  <text x="60" y="510" class="section-content">Data engineering, machine learning applications, building tools that actually save</text>
  <text x="60" y="530" class="section-content">people time, and exploring emerging tech like extended reality.</text>

  <!-- Contact Section -->
  <text x="60" y="570" class="section-title">Reach Out</text>
  <text x="60" y="600" class="section-content">Questions? Ideas? Just want to chat? Feel free to get in touch using the buttons</text>
  <text x="60" y="620" class="section-content">above!</text>



</svg>